<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 幻影影棚 DEMO</title>
  <style>
    :root {
      --bg: #efe7db;
      --card: rgba(255, 252, 247, 0.88);
      --text: #21170d;
      --muted: #6b5743;
      --line: rgba(48, 31, 14, 0.12);
      --accent: #9f5e25;
      --accent-2: #dcc7a8;
      --ok: #2a6b46;
      --warn: #8c4e1d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Noto Serif SC", "Source Han Serif SC", serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.88), transparent 34%),
        radial-gradient(circle at bottom right, rgba(220,199,168,0.9), transparent 28%),
        linear-gradient(135deg, #e9e0d3, #f8f4ee 48%, #e7ddcf);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 42px 20px 60px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }
    .hero p {
      margin: 0;
      max-width: 880px;
      color: var(--muted);
      font-size: 16px;
    }
    .grid {
      margin-top: 26px;
      display: grid;
      grid-template-columns: 460px minmax(0, 1fr);
      gap: 20px;
    }
    .panel {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow: 0 22px 56px rgba(40, 24, 10, 0.08);
    }
    .row { margin-bottom: 14px; }
    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input, textarea, select, button {
      width: 100%;
      font: inherit;
      border-radius: 16px;
    }
    input, textarea, select {
      padding: 14px 16px;
      border: 1px solid rgba(48, 31, 14, 0.14);
      background: rgba(255, 255, 255, 0.76);
      color: var(--text);
    }
    textarea {
      min-height: 124px;
      resize: vertical;
    }
    button {
      padding: 14px 18px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #bb7638);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    button:disabled {
      opacity: 0.64;
      cursor: wait;
    }
    .status, .meta {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.74);
      white-space: pre-wrap;
      color: var(--muted);
      line-height: 1.6;
    }
    .status strong {
      color: var(--text);
    }
    .note,
    .guide {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(48, 31, 14, 0.08);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ghost {
      width: auto;
      padding: 10px 14px;
      border: 1px solid rgba(48, 31, 14, 0.14);
      background: rgba(255,255,255,0.72);
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0.03em;
    }
    .preview {
      display: grid;
      gap: 14px;
    }
    .previewGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .previewStage {
      min-height: 560px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.35)),
        repeating-linear-gradient(
          45deg,
          rgba(159,94,37,0.04),
          rgba(159,94,37,0.04) 18px,
          transparent 18px,
          transparent 36px
        );
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .stageHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(48, 31, 14, 0.08);
      background: rgba(255,255,255,0.45);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .stageCanvas {
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .preview img {
      display: block;
      max-width: 100%;
      max-height: 840px;
    }
    .batchResults {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .batchCard {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(48, 31, 14, 0.1);
      background: rgba(255,255,255,0.82);
    }
    .batchCard img {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: rgba(255,255,255,0.5);
    }
    .batchMeta {
      display: grid;
      gap: 6px;
      padding: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .batchMeta strong {
      color: var(--text);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(48, 31, 14, 0.1);
      background: rgba(255,255,255,0.72);
      color: var(--muted);
      font-size: 12px;
      margin: 10px 10px 0 0;
    }
    .hidden { display: none; }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .previewGrid { grid-template-columns: 1fr; }
      .previewStage { min-height: 320px; }
      .inline { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>AI 幻影影棚</h1>
      <p>同一个商品，拆成三条生成引擎处理。`Scene` 用于静物换场景和光影，`Try-On` 用于模特上身，`Edit` 用于 Qwen 多角度和在线编辑。这样才能同时保住商品主体一致性和商业展示质量。</p>
      <div id="healthBadges"></div>
    </section>

    <div class="grid">
      <section class="panel">
        <div class="row">
          <label for="mode">生成模式</label>
          <select id="mode">
            <option value="scene">Scene 场景图</option>
            <option value="tryon">Try-On 模特上身</option>
            <option value="edit">Edit 多角度 / 在线编辑</option>
            <option value="batch">Batch 批量电商出图</option>
          </select>
        </div>

        <div class="row">
          <label for="catalogProfile">电商模板</label>
          <select id="catalogProfile">
            <option value="">手动配置</option>
          </select>
          <div id="profileNote" class="note">可选：一键套用睡裙/服饰的推荐场景、模特和编辑策略。</div>
        </div>

        <div id="singleImageRow" class="row">
          <label for="image">商品图</label>
          <input id="image" name="image" type="file" accept="image/*" required>
        </div>

        <div id="batchFields" class="hidden">
          <div class="row">
            <label for="batchImages">批量商品图</label>
            <input id="batchImages" name="batchImages" type="file" accept="image/*" multiple>
          </div>
          <div id="batchNote" class="note">批量模式会按当前电商模板顺序执行所有场景、商品角度、模特上身和模特多角度任务。</div>
        </div>

        <div id="modeGuide" class="guide">上传商品图后按当前模式生成。</div>

        <div id="sceneFields">
          <div class="row">
            <label for="productBrief">产品描述</label>
            <input id="productBrief" value="premium silk nightdress product photo" placeholder="例如：premium silk slip dress product photo">
          </div>
          <div class="row">
            <label for="scenePreset">场景预设</label>
            <select id="scenePreset"></select>
          </div>
          <div class="row">
            <label for="prompt">正向提示词</label>
            <textarea id="prompt" placeholder="根据预设自动填充，也可手改。"></textarea>
          </div>
          <div class="row">
            <label for="negativePrompt">反向提示词</label>
            <textarea id="negativePrompt"></textarea>
          </div>
        </div>

        <div id="tryonFields" class="hidden">
          <div class="row">
            <label for="personTemplate">模特模板</label>
            <select id="personTemplate"></select>
          </div>
          <div class="row">
            <label for="personImage">自定义模特图（可选，优先级高于模板）</label>
            <input id="personImage" name="personImage" type="file" accept="image/*">
          </div>
          <div class="inline">
            <div class="row">
              <label for="clothType">服装类型</label>
              <select id="clothType">
                <option value="overall">连衣裙 / 整体服饰</option>
                <option value="upper">上装</option>
                <option value="lower">下装</option>
              </select>
            </div>
            <div class="row">
              <label for="steps">步数</label>
              <input id="steps" type="number" value="30">
            </div>
          </div>
          <div class="inline">
            <div class="row">
              <label for="guidance">Guidance</label>
              <input id="guidance" type="number" step="0.1" value="2.5">
            </div>
            <div class="row">
              <label for="seed">Seed</label>
              <input id="seed" type="number" value="123">
            </div>
          </div>
        </div>

        <div id="editFields" class="hidden">
          <div class="row">
            <label for="editPreset">编辑预设</label>
            <select id="editPreset"></select>
            <div id="editPresetGuide" class="note">选择一个多角度或光线编辑方向。</div>
          </div>
          <div class="row">
            <label for="editPrompt">补充提示词</label>
            <textarea id="editPrompt" placeholder="例如：same product on a clean premium white set, polished rim light"></textarea>
          </div>
          <div class="row">
            <label for="editNegativePrompt">反向提示词</label>
            <textarea id="editNegativePrompt"></textarea>
          </div>
          <div class="inline">
            <div class="row">
              <label for="editSteps">步数</label>
              <input id="editSteps" type="number" value="8">
            </div>
            <div class="row">
              <label for="editCfg">True CFG</label>
              <input id="editCfg" type="number" step="0.1" value="1.0">
            </div>
          </div>
          <div class="inline">
            <div class="row">
              <label for="editSeed">Seed</label>
              <input id="editSeed" type="number" value="123">
            </div>
            <div class="row">
              <label for="editUseAngleLora">多角度 LoRA</label>
              <select id="editUseAngleLora">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
          </div>
          <div class="inline">
            <div class="row">
              <label for="editUseLightning">Lightning</label>
              <select id="editUseLightning">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
            <div class="row">
              <label for="editWidth">输出尺寸（宽，可选）</label>
              <input id="editWidth" type="number" placeholder="默认按原图比例自动计算">
            </div>
          </div>
          <div class="row">
            <label for="editHeight">输出尺寸（高，可选）</label>
            <input id="editHeight" type="number" placeholder="默认按原图比例自动计算">
          </div>
          <div class="row">
            <label>连续编辑</label>
            <div class="actions">
              <button id="reuseResult" class="ghost" type="button">把当前结果设为下一轮输入</button>
              <button id="clearReuse" class="ghost" type="button">恢复上传商品图</button>
            </div>
            <div id="editInputState" class="note">当前输入：上传商品图</div>
          </div>
        </div>

        <button id="submit">生成</button>
        <div id="status" class="status">等待请求。</div>
      </section>

      <section class="panel">
        <div class="preview">
          <div class="previewGrid">
            <div class="previewStage">
              <div class="stageHead">
                <span>输入图</span>
                <span id="inputBadge">等待选择</span>
              </div>
              <div class="stageCanvas">
                <img id="sourcePreview" alt="输入图预览">
              </div>
            </div>
            <div class="previewStage">
              <div class="stageHead">
                <span>生成结果</span>
                <span id="resultBadge">等待生成</span>
              </div>
              <div class="stageCanvas">
                <img id="result" alt="生成结果将显示在这里">
              </div>
            </div>
          </div>
        </div>
        <div id="meta" class="meta">尚未生成。</div>
        <div id="batchResults" class="batchResults hidden"></div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      catalogProfiles: [],
      scenePresets: [],
      tryonTemplates: [],
      editPresets: [],
      lastResult: null,
      editInputOverride: null,
      uploadPreviewUrl: "",
      batchEntries: [],
    };

    const els = {
      mode: document.getElementById("mode"),
      catalogProfile: document.getElementById("catalogProfile"),
      profileNote: document.getElementById("profileNote"),
      singleImageRow: document.getElementById("singleImageRow"),
      image: document.getElementById("image"),
      batchImages: document.getElementById("batchImages"),
      batchFields: document.getElementById("batchFields"),
      batchNote: document.getElementById("batchNote"),
      personImage: document.getElementById("personImage"),
      productBrief: document.getElementById("productBrief"),
      scenePreset: document.getElementById("scenePreset"),
      prompt: document.getElementById("prompt"),
      negativePrompt: document.getElementById("negativePrompt"),
      personTemplate: document.getElementById("personTemplate"),
      clothType: document.getElementById("clothType"),
      steps: document.getElementById("steps"),
      guidance: document.getElementById("guidance"),
      seed: document.getElementById("seed"),
      editPreset: document.getElementById("editPreset"),
      editPrompt: document.getElementById("editPrompt"),
      editNegativePrompt: document.getElementById("editNegativePrompt"),
      editSteps: document.getElementById("editSteps"),
      editCfg: document.getElementById("editCfg"),
      editSeed: document.getElementById("editSeed"),
      editUseAngleLora: document.getElementById("editUseAngleLora"),
      editUseLightning: document.getElementById("editUseLightning"),
      editWidth: document.getElementById("editWidth"),
      editHeight: document.getElementById("editHeight"),
      editPresetGuide: document.getElementById("editPresetGuide"),
      reuseResult: document.getElementById("reuseResult"),
      clearReuse: document.getElementById("clearReuse"),
      editInputState: document.getElementById("editInputState"),
      submit: document.getElementById("submit"),
      modeGuide: document.getElementById("modeGuide"),
      sourcePreview: document.getElementById("sourcePreview"),
      inputBadge: document.getElementById("inputBadge"),
      status: document.getElementById("status"),
      result: document.getElementById("result"),
      resultBadge: document.getElementById("resultBadge"),
      batchResults: document.getElementById("batchResults"),
      meta: document.getElementById("meta"),
      sceneFields: document.getElementById("sceneFields"),
      tryonFields: document.getElementById("tryonFields"),
      editFields: document.getElementById("editFields"),
      healthBadges: document.getElementById("healthBadges"),
    };

    function setStatus(text) {
      els.status.textContent = text;
    }

    function getSelectedProfile() {
      return state.catalogProfiles.find((item) => item.name === els.catalogProfile.value) || null;
    }

    function indexByName(items) {
      return new Map(items.map((item) => [item.name, item]));
    }

    function resolveProfilePlan(profile) {
      const sceneMap = indexByName(state.scenePresets);
      const editMap = indexByName(state.editPresets);
      return {
        scenes: (profile?.scene_presets || []).map((name) => sceneMap.get(name)).filter(Boolean),
        edits: (profile?.edit_presets || []).map((name) => editMap.get(name)).filter(Boolean),
        tryonTemplates: profile?.tryon_templates || [],
        tryonAngles: (profile?.tryon_angle_presets || []).map((name) => editMap.get(name)).filter(Boolean),
      };
    }

    function renderBatchNote() {
      const profile = getSelectedProfile();
      if (!profile) {
        els.batchNote.textContent = "批量模式需要先选择一个电商模板 profile。";
        return;
      }
      const plan = resolveProfilePlan(profile);
      const perFileCount = plan.scenes.length + plan.edits.length + plan.tryonTemplates.length + (plan.tryonTemplates.length * plan.tryonAngles.length);
      els.batchNote.textContent = `${profile.title}: 单张商品图预计输出 ${perFileCount} 张图（${plan.scenes.length} scene / ${plan.edits.length} edit / ${plan.tryonTemplates.length} tryon / ${plan.tryonTemplates.length * plan.tryonAngles.length} tryon_angle）。`;
    }

    function renderBadges(health) {
      const badges = [
        `ComfyUI: ${health.comfyui_reachable ? "在线" : "离线"}`,
        `Try-On: ${health.tryon_script_exists && health.tryon_root_exists ? "已接入" : "未就绪"}`,
        `模板数: ${health.tryon_template_count ?? 0}`,
        `Edit 预设: ${health.edit_preset_count ?? 0}`,
        `Workflow 节点: ${health.workflow_nodes ?? 0}`,
      ];
      els.healthBadges.innerHTML = badges.map((item) => `<span class="badge">${item}</span>`).join("");
    }

    function updateModeGuide() {
      const mode = els.mode.value;
      const profile = getSelectedProfile();
      const prefix = profile ? `当前模板：${profile.title}。` : "";
      if (mode === "scene") {
        els.modeGuide.textContent = `${prefix}上传商品图，选择场景预设，生成静物场景和光线变化图。`;
      } else if (mode === "tryon") {
        els.modeGuide.textContent = `${prefix}上传商品图，选择模特模板或自定义模特，生成真实上身展示图。`;
      } else if (mode === "edit") {
        els.modeGuide.textContent = `${prefix}上传商品图或复用上一轮结果，选择多角度/光线预设，做连续在线编辑。`;
      } else {
        els.modeGuide.textContent = `${prefix}批量上传多张商品图，按模板顺序依次生成整套电商素材。`;
      }
    }

    function updateModeUI() {
      const mode = els.mode.value;
      const isScene = mode === "scene";
      const isTryon = mode === "tryon";
      const isEdit = mode === "edit";
      const isBatch = mode === "batch";
      els.singleImageRow.classList.toggle("hidden", isBatch);
      els.batchFields.classList.toggle("hidden", !isBatch);
      els.sceneFields.classList.toggle("hidden", !isScene);
      els.tryonFields.classList.toggle("hidden", !isTryon);
      els.editFields.classList.toggle("hidden", !isEdit);
      els.batchResults.classList.toggle("hidden", !isBatch);
      els.submit.textContent = isScene
        ? "生成场景图"
        : isTryon
          ? "生成模特上身图"
          : isEdit
            ? "生成多角度/编辑图"
            : "批量生成整套素材";
      updateModeGuide();
      renderBatchNote();
      renderSourcePreview();
      syncEditInputState();
    }

    function applyScenePreset() {
      const preset = state.scenePresets.find((item) => item.name === els.scenePreset.value);
      if (!preset) return;
      const productBrief = els.productBrief.value.trim() || "premium ecommerce product";
      els.prompt.value = preset.prompt_template.replace("{product_brief}", productBrief);
      els.negativePrompt.value = preset.negative_prompt || "";
    }

    function applyEditPreset() {
      const preset = state.editPresets.find((item) => item.name === els.editPreset.value);
      if (!preset) return;
      els.editNegativePrompt.value = preset.negative_prompt || "";
      els.editUseAngleLora.value = preset.use_angle_lora ? "true" : "false";
      els.editPresetGuide.textContent = preset.prompt_template || "选择一个多角度或光线编辑方向。";
    }

    function renderProfileNote() {
      const profile = getSelectedProfile();
      if (!profile) {
        els.profileNote.textContent = "可选：一键套用睡裙/服饰的推荐场景、模特和编辑策略。";
        return;
      }
      els.profileNote.textContent = `${profile.title}: ${profile.description}`;
    }

    function applyCatalogProfile() {
      const profile = getSelectedProfile();
      renderProfileNote();
      if (!profile) {
        updateModeGuide();
        return;
      }

      if (profile.product_brief) {
        els.productBrief.value = profile.product_brief;
      }
      if (Array.isArray(profile.scene_presets) && profile.scene_presets.length) {
        const scenePreset = state.scenePresets.find((item) => item.name === profile.scene_presets[0]);
        if (scenePreset) {
          els.scenePreset.value = scenePreset.name;
        }
      }
      if (Array.isArray(profile.tryon_templates) && profile.tryon_templates.length) {
        const personTemplate = state.tryonTemplates.find((item) => item.name === profile.tryon_templates[0]);
        if (personTemplate) {
          els.personTemplate.value = personTemplate.name;
        }
      }
      if (profile.cloth_type) {
        els.clothType.value = profile.cloth_type;
      }
      if (Array.isArray(profile.edit_presets) && profile.edit_presets.length) {
        const editPreset = state.editPresets.find((item) => item.name === profile.edit_presets[0]);
        if (editPreset) {
          els.editPreset.value = editPreset.name;
        }
      }
      if (profile.edit_extra_prompt) {
        els.editPrompt.value = profile.edit_extra_prompt;
      }
      applyScenePreset();
      applyEditPreset();
      updateModeGuide();
      renderBatchNote();
    }

    function revokeUploadPreviewUrl() {
      if (state.uploadPreviewUrl) {
        URL.revokeObjectURL(state.uploadPreviewUrl);
        state.uploadPreviewUrl = "";
      }
    }

    function renderSourcePreview() {
      if (els.mode.value === "edit" && state.editInputOverride) {
        revokeUploadPreviewUrl();
        els.sourcePreview.src = state.editInputOverride.dataUrl;
        els.inputBadge.textContent = "上一轮结果";
        return;
      }

      const image = els.mode.value === "batch" ? els.batchImages.files[0] : els.image.files[0];
      if (!image) {
        revokeUploadPreviewUrl();
        els.sourcePreview.removeAttribute("src");
        els.inputBadge.textContent = "等待选择";
        return;
      }

      revokeUploadPreviewUrl();
      state.uploadPreviewUrl = URL.createObjectURL(image);
      els.sourcePreview.src = state.uploadPreviewUrl;
      els.inputBadge.textContent = els.mode.value === "batch" ? "批量首图" : "上传商品图";
    }

    function syncEditInputState() {
      const usingResult = els.mode.value === "edit" && !!state.editInputOverride;
      els.editInputState.textContent = usingResult ? "当前输入：上一轮结果" : "当前输入：上传商品图";
      els.reuseResult.disabled = !state.lastResult;
      els.clearReuse.disabled = !state.editInputOverride;
    }

    function setLatestResult(data) {
      const dataUrl = `data:${data.mime_type};base64,${data.image_base64}`;
      const binary = atob(data.image_base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      state.lastResult = {
        dataUrl,
        blob: new Blob([bytes], { type: data.mime_type }),
        filename: data.filename || "result.png",
        mimeType: data.mime_type,
      };
      els.result.src = dataUrl;
      els.resultBadge.textContent = data.pipeline || "已生成";
      syncEditInputState();
    }

    function resetBatchResults() {
      state.batchEntries = [];
      els.batchResults.innerHTML = "";
      els.meta.textContent = "批量任务准备中。";
    }

    function appendBatchResult(entry) {
      state.batchEntries.push(entry);
      const card = document.createElement("article");
      card.className = "batchCard";
      card.innerHTML = `
        <img src="${entry.imageUrl}" alt="${entry.variant}">
        <div class="batchMeta">
          <strong>${entry.type}</strong>
          <span>${entry.variant}</span>
          <code>${entry.generatorMode}</code>
          <span>${entry.source}</span>
        </div>
      `;
      els.batchResults.appendChild(card);
    }

    function buildBatchSummary(total, fileCount) {
      const counts = state.batchEntries.reduce((acc, item) => {
        acc[item.type] = (acc[item.type] || 0) + 1;
        return acc;
      }, {});
      return [
        `批量完成：${state.batchEntries.length}/${total}`,
        `商品图数量：${fileCount}`,
        `scene: ${counts.scene || 0}`,
        `edit: ${counts.edit || 0}`,
        `tryon: ${counts.tryon || 0}`,
        `tryon_angle: ${counts.tryon_angle || 0}`,
      ].join("\n");
    }

    async function fileToBase64(file) {
      const buffer = await file.arrayBuffer();
      let binary = "";
      const bytes = new Uint8Array(buffer);
      const chunkSize = 0x8000;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }

    async function fetchHealth() {
      const response = await fetch("/api/health");
      const data = await response.json();
      renderBadges(data);
      const comfy = data.comfyui_reachable ? "ComfyUI 在线" : "ComfyUI 未连通";
      const tryon = data.tryon_script_exists && data.tryon_root_exists ? "Try-On 已接入" : "Try-On 未就绪";
      const edit = `Edit 预设 ${data.edit_preset_count ?? 0} 个`;
      setStatus(`${comfy}，${tryon}，${edit}`);
    }

    async function fetchPresets() {
      const [sceneResp, tryonResp, editResp, profileResp] = await Promise.all([
        fetch("/api/presets/scenes"),
        fetch("/api/presets/tryon-templates"),
        fetch("/api/presets/edit-presets"),
        fetch("/api/presets/catalog-profiles"),
      ]);
      state.scenePresets = await sceneResp.json();
      state.tryonTemplates = await tryonResp.json();
      state.editPresets = await editResp.json();
      state.catalogProfiles = await profileResp.json();

      els.scenePreset.innerHTML = state.scenePresets
        .map((item) => `<option value="${item.name}">${item.title}</option>`)
        .join("");
      els.catalogProfile.innerHTML = ['<option value="">手动配置</option>']
        .concat(state.catalogProfiles.map((item) => `<option value="${item.name}">${item.title}</option>`))
        .join("");
      els.personTemplate.innerHTML = state.tryonTemplates
        .map((item) => `<option value="${item.name}">${item.name}</option>`)
        .join("");
      els.editPreset.innerHTML = state.editPresets
        .map((item) => `<option value="${item.name}">${item.title}</option>`)
        .join("");
      applyScenePreset();
      applyEditPreset();
      renderProfileNote();
      renderBatchNote();
      updateModeGuide();
    }

    function formatMeta(data) {
      const lines = [
        `pipeline: ${data.pipeline}`,
        `generator_mode: ${data.generator_mode}`,
        `filename: ${data.filename}`,
        `output_url: ${data.output_url}`,
      ];
      if (data.local_input_path) {
        lines.push(`local_input_path: ${data.local_input_path}`);
      }
      if (data.metadata && Object.keys(data.metadata).length) {
        lines.push(`metadata: ${JSON.stringify(data.metadata, null, 2)}`);
      }
      return lines.join("\n");
    }

    async function readApiPayload(response) {
      const text = await response.text();
      try {
        const data = JSON.parse(text);
        if (!response.ok) {
          throw new Error(data.detail || text || "请求失败");
        }
        return data;
      } catch (error) {
        if (!response.ok) {
          throw new Error(text || `HTTP ${response.status}`);
        }
        throw error;
      }
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      return await readApiPayload(response);
    }

    async function submitScene() {
      const image = els.image.files[0];
      const prompt = els.prompt.value.trim();
      const negativePrompt = els.negativePrompt.value.trim();
      const seed = els.seed.value.trim();

      if (!image) throw new Error("请选择商品图。");
      if (!prompt) throw new Error("请填写提示词。");

      const formData = new FormData();
      formData.append("image", image);
      formData.append("prompt", prompt);
      formData.append("negative_prompt", negativePrompt);
      if (seed) formData.append("seed", seed);

      const response = await fetch("/generate/scene", {
        method: "POST",
        body: formData,
      });
      return await readApiPayload(response);
    }

    async function submitTryon() {
      const image = els.image.files[0];
      if (!image) throw new Error("请选择商品图。");

      const formData = new FormData();
      formData.append("image", image);
      formData.append("person_template", els.personTemplate.value);
      formData.append("cloth_type", els.clothType.value);
      formData.append("steps", els.steps.value.trim() || "30");
      formData.append("guidance", els.guidance.value.trim() || "2.5");
      formData.append("seed", els.seed.value.trim() || "123");

      const personImage = els.personImage.files[0];
      if (personImage) {
        formData.append("person_image", personImage);
      }

      const response = await fetch("/generate/tryon", {
        method: "POST",
        body: formData,
      });
      return await readApiPayload(response);
    }

    async function submitEdit() {
      const image = state.editInputOverride || els.image.files[0];
      if (!image) throw new Error("请选择商品图。");

      const formData = new FormData();
      if (state.editInputOverride) {
        formData.append("image", state.editInputOverride.blob, state.editInputOverride.filename);
      } else {
        formData.append("image", image);
      }
      formData.append("prompt", els.editPrompt.value.trim());
      formData.append("negative_prompt", els.editNegativePrompt.value.trim());
      formData.append("angle_preset", els.editPreset.value);
      formData.append("use_angle_lora", els.editUseAngleLora.value);
      formData.append("use_lightning", els.editUseLightning.value);
      formData.append("steps", els.editSteps.value.trim() || "8");
      formData.append("true_cfg_scale", els.editCfg.value.trim() || "1.0");
      formData.append("seed", els.editSeed.value.trim() || "123");
      if (els.editWidth.value.trim()) formData.append("width", els.editWidth.value.trim());
      if (els.editHeight.value.trim()) formData.append("height", els.editHeight.value.trim());

      const response = await fetch("/generate/edit", {
        method: "POST",
        body: formData,
      });
      return await readApiPayload(response);
    }

    async function submitBatch() {
      const files = Array.from(els.batchImages.files || []);
      const profile = getSelectedProfile();
      if (!files.length) throw new Error("请至少选择一张商品图。");
      if (!profile) throw new Error("批量模式需要先选择一个电商模板。");

      const plan = resolveProfilePlan(profile);
      if (!plan.scenes.length && !plan.edits.length && !plan.tryonTemplates.length) {
        throw new Error("当前模板没有可执行的批量项。");
      }

      resetBatchResults();

      const totalPerFile = plan.scenes.length + plan.edits.length + plan.tryonTemplates.length + (plan.tryonTemplates.length * plan.tryonAngles.length);
      const totalTasks = totalPerFile * files.length;
      let completed = 0;
      let seed = 1000;

      const pushResult = (data, type, variant, sourceName) => {
        setLatestResult(data);
        appendBatchResult({
          type,
          variant,
          source: sourceName,
          generatorMode: data.generator_mode,
          imageUrl: data.output_url || `data:${data.mime_type};base64,${data.image_base64}`,
        });
      };

      for (const file of files) {
        const imageBase64 = await fileToBase64(file);
        const sourceName = file.name;

        for (const scene of plan.scenes) {
          setStatus(`批量中 ${completed + 1}/${totalTasks}: ${sourceName} -> scene/${scene.name}`);
          const data = await postJson("/generate/scene", {
            filename: file.name,
            image_base64: imageBase64,
            prompt: scene.prompt_template.replace("{product_brief}", profile.product_brief || els.productBrief.value.trim() || "premium ecommerce product"),
            negative_prompt: scene.negative_prompt || "",
            seed,
          });
          pushResult(data, "scene", scene.name, sourceName);
          completed += 1;
          seed += 1;
        }

        for (const preset of plan.edits) {
          setStatus(`批量中 ${completed + 1}/${totalTasks}: ${sourceName} -> edit/${preset.name}`);
          const promptParts = [preset.prompt_template, profile.edit_extra_prompt || ""].filter(Boolean);
          const data = await postJson("/generate/edit", {
            filename: file.name,
            image_base64: imageBase64,
            angle_preset: preset.name,
            prompt: promptParts.join("\n"),
            negative_prompt: preset.negative_prompt || "",
            seed,
            steps: 8,
            true_cfg_scale: 1.0,
            use_angle_lora: !!preset.use_angle_lora,
            use_lightning: true,
          });
          pushResult(data, "edit", preset.name, sourceName);
          completed += 1;
          seed += 1;
        }

        for (const templateName of plan.tryonTemplates) {
          setStatus(`批量中 ${completed + 1}/${totalTasks}: ${sourceName} -> tryon/${templateName}`);
          const tryonData = await postJson("/generate/tryon", {
            filename: file.name,
            image_base64: imageBase64,
            person_template: templateName,
            cloth_type: profile.cloth_type || "overall",
            seed,
            steps: 30,
            guidance: 2.5,
            width: 768,
            height: 1024,
          });
          pushResult(tryonData, "tryon", templateName, sourceName);
          completed += 1;
          seed += 1;

          for (const preset of plan.tryonAngles) {
            setStatus(`批量中 ${completed + 1}/${totalTasks}: ${sourceName} -> tryon_angle/${templateName}/${preset.name}`);
            const promptParts = [
              preset.prompt_template,
              "Keep the exact same model identity, face, hairstyle, body proportions, garment fit, pattern, trim, color, and silhouette. Only change the camera viewpoint, framing, and lighting in a photorealistic premium ecommerce fashion photo.",
              profile.tryon_angle_extra_prompt || "",
            ].filter(Boolean);
            const data = await postJson("/generate/edit", {
              filename: `${file.name.replace(/\.[^.]+$/, "")}__${templateName}.png`,
              image_base64: tryonData.image_base64,
              angle_preset: preset.name,
              prompt: promptParts.join("\n"),
              negative_prompt: preset.negative_prompt || "",
              seed,
              steps: 8,
              true_cfg_scale: 1.0,
              use_angle_lora: !!preset.use_angle_lora,
              use_lightning: true,
            });
            pushResult(data, "tryon_angle", `${templateName} / ${preset.name}`, sourceName);
            completed += 1;
            seed += 1;
          }
        }
      }

      els.meta.textContent = buildBatchSummary(totalTasks, files.length);
      setStatus(`批量完成，共输出 ${state.batchEntries.length} 张结果。`);
      els.resultBadge.textContent = "批量完成";
      return { pipeline: "batch", generator_mode: "multi-engine", filename: `${files.length} files`, output_url: "", mime_type: "", image_base64: "" };
    }

    els.mode.addEventListener("change", updateModeUI);
    els.catalogProfile.addEventListener("change", applyCatalogProfile);
    els.scenePreset.addEventListener("change", applyScenePreset);
    els.productBrief.addEventListener("change", applyScenePreset);
    els.editPreset.addEventListener("change", applyEditPreset);
    els.image.addEventListener("change", () => {
      state.editInputOverride = null;
      renderSourcePreview();
      syncEditInputState();
    });
    els.batchImages.addEventListener("change", () => {
      renderSourcePreview();
      renderBatchNote();
    });
    els.reuseResult.addEventListener("click", () => {
      if (!state.lastResult) return;
      state.editInputOverride = {
        ...state.lastResult,
        filename: `iterative-${state.lastResult.filename || "edit-source.png"}`,
      };
      els.mode.value = "edit";
      updateModeUI();
    });
    els.clearReuse.addEventListener("click", () => {
      state.editInputOverride = null;
      renderSourcePreview();
      syncEditInputState();
    });

    els.submit.addEventListener("click", async () => {
      els.submit.disabled = true;
      setStatus("请求已发出，等待 GPU 返回结果...");
      els.meta.textContent = "生成中。";

      try {
        if (els.mode.value === "batch") {
          await submitBatch();
        } else {
          const data = els.mode.value === "scene"
            ? await submitScene()
            : els.mode.value === "tryon"
              ? await submitTryon()
              : await submitEdit();
          setLatestResult(data);
          setStatus(`完成。pipeline=${data.pipeline}，mode=${data.generator_mode}`);
          els.meta.textContent = formatMeta(data);
        }
      } catch (error) {
        setStatus(`失败: ${error.message}`);
        els.meta.textContent = "请检查 API、ComfyUI、CatVTON、Qwen Edit 依赖和模型下载状态。";
      } finally {
        els.submit.disabled = false;
      }
    });

    updateModeUI();
    syncEditInputState();
    fetchHealth().catch((error) => setStatus(`健康检查失败: ${error.message}`));
    fetchPresets().catch((error) => setStatus(`预设加载失败: ${error.message}`));
  </script>
</body>
</html>
